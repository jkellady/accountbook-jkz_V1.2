<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      .bg { fill: #181818; }
      .letter { fill: #F37002; }
    </style>
    <clipPath id="rounded">
      <rect x="0" y="0" width="512" height="512" rx="64" ry="64"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <rect class="bg" x="0" y="0" width="512" height="512"/>
    <text
      x="256"
      y="340"
      text-anchor="middle"
      font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
      font-size="280"
      font-weight="700"
      class="letter"
    >Z</text>
  </g>
</svg>
